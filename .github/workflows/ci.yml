name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

env:
  AWS_REGION: us-east-1
  BUCKET_NAME: innovatech-frontend
  # URL publica del backend (Load Balancer de EKS). Vite la inyecta en el build.
  # Override recomendado: definir la Actions Variable VITE_BACKEND_URL en el repo.
  VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL || 'http://a4ac4015440b24bc29cf25935aefaca7-1647581886.us-east-1.elb.amazonaws.com' }}

jobs:
  build:
    name: Lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front_innovatech
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front_innovatech/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: front_innovatech/dist

  deploy:
    name: Deploy to S3
    needs: build
    # Solo deploya en push a main o ejecucion manual; los PRs quedan en lint+build.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync dist/ to S3
        run: aws s3 sync dist/ "s3://$BUCKET_NAME" --delete --region "$AWS_REGION"

      - name: Show site URL
        run: echo "Sitio disponible en http://$BUCKET_NAME.s3-website-$AWS_REGION.amazonaws.com"
