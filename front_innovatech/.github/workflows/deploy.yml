name: Deploy to S3

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  AWS_REGION: us-east-1
  BUCKET_NAME: innovatech-frontend
  # URL publica del backend (Load Balancer de EKS). Vite la inyecta en el build.
  VITE_BACKEND_URL: ${{ vars.VITE_BACKEND_URL || 'http://a4ac4015440b24bc29cf25935aefaca7-1647581886.us-east-1.elb.amazonaws.com' }}

jobs:
  deploy:
    name: Build & sync to S3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (VITE_BACKEND_URL desde env del workflow)
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync dist/ to S3
        run: aws s3 sync dist/ "s3://$BUCKET_NAME" --delete --region "$AWS_REGION"

      - name: Show site URL
        run: echo "Sitio disponible en http://$BUCKET_NAME.s3-website-$AWS_REGION.amazonaws.com"
